<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Volhynia 1943–1945</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Georgia, serif;
    }
    .card {
      width: 1200px;
      height: 675px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top {
      background: #7b1535;
      padding: 20px 60px;
      text-align: center;
      flex-shrink: 0;
      margin-bottom: -1px;
      position: relative;
      z-index: 1;
    }
    .motto {
      display: block;
      font-size: 1.7em;
      color: #c9a96e;
      font-style: italic;
      letter-spacing: 0.07em;
      text-align: center;
    }

    .panels {
      display: flex;
      flex: 1;
      margin-bottom: -1px;
      position: relative;
      z-index: 0;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .panel-pl { background: #7b1535; }
    .panel-ua { background: #c9a96e; }

    .country {
      font-size: 2.8em;
      font-weight: bold;
      color: #c9a96e;
      letter-spacing: 0.04em;
    }
    .panel-ua .country { color: #7b1535; }

    .big-num {
      font-size: 5em;
      font-weight: bold;
      color: #c9a96e;
      line-height: 1;
      text-shadow: 0 3px 16px rgba(0,0,0,0.35);
    }
    .panel-ua .big-num { color: #7b1535; }

    .date {
      font-size: 1.1em;
      font-style: italic;
      color: rgba(201,169,110,0.7);
      letter-spacing: 0.05em;
    }
    .panel-ua .date { color: rgba(123,21,53,0.6); }

    .bottom {
      background: #c9a96e;
      padding: 20px 64px;
      flex-shrink: 0;
      text-align: center;
    }
    .quote {
      font-size: 1.7em;
      color: #7b1535;
      font-style: italic;
      text-align: center;
      line-height: 1.55;
    }
  </style>
</head>
<body>
<div class="card">

  <div class="top">
    <span class="motto">"Love your neighbor as yourself."</span>
  </div>

  <div class="panels">

    <div class="panel panel-pl">
      <div class="country">Poland</div>
      <div class="big-num">100 000</div>
      <div class="date">1943–1945</div>
    </div>

    <div class="panel panel-ua">
      <div class="country">Ukraine</div>
      <div class="big-num">20 000</div>
      <div class="date">1943–1945</div>
    </div>

  </div>

  <div class="bottom">
    <p class="quote">"Eye for eye, tooth for tooth, hand for hand, foot for foot."</p>
  </div>

</div>
</body>
</html>
