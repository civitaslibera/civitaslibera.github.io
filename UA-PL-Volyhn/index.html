<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polish–Ukrainian Conflict 1918–1947 | Civitas Libera</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 48px 24px 80px;
      max-width: 680px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2em;
      color: #c9a96e;
      letter-spacing: 0.1em;
      font-weight: normal;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    h2 {
      font-size: 1em;
      color: #555;
      font-weight: normal;
      font-style: italic;
      margin-bottom: 32px;
    }

    /* infographic teaser */
    .teaser-link {
      display: block;
      text-decoration: none;
      width: 100%;
      margin-bottom: 24px;
    }
    .teaser-clip {
      width: 100%;
      padding-top: 56.25%;
      position: relative;
      overflow: hidden;
      border-left: 4px solid #7b1535;
      transition: border-color 0.2s;
    }
    .teaser-link:hover .teaser-clip { border-left-color: #c9a96e; }
    .teaser-clip iframe {
      position: absolute;
      top: 0; left: 0;
      width: 1200px;
      height: 675px;
      border: none;
      pointer-events: none;
      transform-origin: top left;
    }

    .section-label {
      font-size: 0.68em;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .lang-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .lang-btn {
      display: inline-block;
      text-decoration: none;
      padding: 8px 20px;
      border: 1px solid #2a2a2a;
      border-bottom: 3px solid #7b1535;
      background: #141414;
      color: #c9a96e;
      font-size: 0.9em;
      letter-spacing: 0.06em;
      transition: border-bottom-color 0.2s, background 0.2s;
    }
    .lang-btn:hover {
      border-bottom-color: #c9a96e;
      background: #1a160e;
    }
    footer {
      margin-top: 60px;
      font-size: 0.7em;
      color: #222;
      letter-spacing: 0.08em;
    }
    footer a { color: #333; text-decoration: none; }
    footer a:hover { color: #c9a96e; }
    h1 a { color: inherit; text-decoration: none; }

    /* ── MODERN TIMELINE ──────────────────────── */
    .timeline-heading {
      font-size: 1.4em;
      font-weight: normal;
      color: #c9a96e;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin: 4em 0 1em;
      padding-top: 2em;
      border-top: 1px solid #2a2a2a;
      text-align: center;
    }

  </style>
</head>
<body>

  <h1><a href="../">Civitas Libera</a></h1>
  <h3 class="timeline-heading">Polish–Ukrainian Conflict 1918–1947</h3>

  <a class="teaser-link" href="ENG/">
    <div class="teaser-clip">
      <iframe id="teaser-frame" src="UA-PL-X.html" scrolling="no" tabindex="-1"></iframe>
    </div>
  </a>

  <div class="section-label">Read the article</div>
  <div class="lang-row">
    <a class="lang-btn" href="PL/">PL</a>
    <a class="lang-btn" href="ENG/">ENG</a>
    <a class="lang-btn" href="UA/">UA</a>
  </div>

  <a class="teaser-link" href="../UA-PL-Volyhn-Modern/ENG/">
    <div class="teaser-clip">
      <img src="ArticleModern Header.png" alt="Conflict in Modern Days (1991-Today)" style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover;">
    </div>
  </a>

  <div class="section-label">Read the article</div>
  <div class="lang-row">
    <a class="lang-btn" href="../UA-PL-Volyhn-Modern/PL/">PL</a>
    <a class="lang-btn" href="../UA-PL-Volyhn-Modern/ENG/">ENG</a>
    <a class="lang-btn" href="../UA-PL-Volyhn-Modern/UA/">UA</a>
  </div>

  <script>
    function scaleTeaser() {
      var clip = document.querySelector('.teaser-clip');
      var frame = document.getElementById('teaser-frame');
      var scale = clip.offsetWidth / 1200;
      frame.style.transform = 'scale(' + scale + ')';
    }
    scaleTeaser();
    window.addEventListener('resize', scaleTeaser);
  </script>
</body>
</html>
