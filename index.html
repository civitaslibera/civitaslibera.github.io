<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Civitas Libera</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 48px 24px 80px;
      max-width: 680px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2em;
      color: #c9a96e;
      letter-spacing: 0.1em;
      font-weight: normal;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .project-card {
      display: block;
      text-decoration: none;
      border-left: 4px solid #7b1535;
      padding: 14px 18px;
      background: #141414;
      margin-bottom: 12px;
      transition: border-color 0.2s, background 0.2s;
    }
    .project-card:hover {
      border-left-color: #c9a96e;
      background: #1a160e;
    }
    .project-title {
      font-size: 1em;
      color: #c9a96e;
      margin-bottom: 3px;
    }
    .project-desc {
      font-size: 0.8em;
      color: #666;
      font-style: italic;
    }
    footer {
      margin-top: 60px;
      font-size: 0.7em;
      color: #222;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <h1>Civitas Libera</h1>

  <a class="project-card" href="UA-PL-Volyhn/">
    <div class="project-title">Polish–Ukrainian Conflict 1918–1947</div>
    <div class="project-desc">An honest attempt to look at both sides of a painful history.</div>
  </a>

  <footer>civitaslibera.github.io</footer>
</body>
</html>
